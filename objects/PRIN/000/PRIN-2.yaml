title: One workspace per learner, reset-friendly
description: All exercises operate on a single ./workspace/ directory at the tutor repo root. `aida-tutor reset` wipes it and restores the starting state for the current exercise. No exercise leaves persistent global state (no ~/.aida/ pollution beyond what AIDA itself does).
