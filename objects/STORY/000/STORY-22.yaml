title: 'Verifier rigor: detect aida-CLI invocations from a wrapper'
description: Exercises 7, 8, 13, 15, 16, 17 currently pass on prerequisite state alone — we can't tell whether the user actually ran a read-only command like `aida search`. A workspace-local `aida` wrapper script that logs invocations to .aida-tutor-invocations.log would let verifiers check 'has the user invoked X this session?'. Optional opt-in (off by default).
