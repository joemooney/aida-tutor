  author: joe
  content: |-
    Implemented via commit 72b710f (branch story-22):

    - aida-tutor wrapper: opt-in `aida` shim at .aida-tutor-bin/aida that logs every invocation to .aida-tutor-invocations.log, then exec's the real CLI; --uninstall reverses it.
    - verify.rs aida_invocations/invoked: tri-state log parser+matcher (None=no wrapper, false=installed-but-unrun, true=ran).
    - exercise.rs verify_invocation: gates the final Pass of the six read-only verifiers (7, 8, 13, 15, 16, 17) so an installed wrapper requires a real invocation; absent wrapper falls back to prerequisite-state checks.

    Test status: 3/3 unit tests green; `reset --yes && demo` walks all 32 exercises.
