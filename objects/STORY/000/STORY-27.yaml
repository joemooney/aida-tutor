title: 'Tutor cluster 3 (roles + queue): exercises for role enter, queue add/pickup/done'
description: |
  Cover the producer/consumer queue workflow (EPIC-12, EPIC-13). 4-5 exercises:

  - **eXX role-enter**: `aida role enter implementer` → verify `AIDA_SESSION_ROLE=implementer` and PS1 prefixed
  - **eXX queue-add-for**: `aida queue add FR-1 --for implementer` → verify entry in queue with for_role=implementer
  - **eXX queue-pickup**: `/aida-pickup` slash command (or `aida queue next` + `aida edit FR-1 --status in-progress`) → verify status flipped
  - **eXX queue-done**: `aida queue done FR-1` → verify status=completed AND queue entry removed atomically
  - **eXX role-end** (optional): `aida role end` → verify env unset and PS1 stripped

  Composes with: BUG-60 (PS1 accumulation) — once that ships, the role-enter exercise can include "enter twice without end, expect single PS1 prefix."
