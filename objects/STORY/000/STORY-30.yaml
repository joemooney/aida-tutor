  content: 'Shipped cluster 6 as exercises 33-35 (content/33-35 + src/exercises/e33-e35). Reconciled the story''s sketch against AIDA 0.7.0''s real CLI surface: (1) plan-add → plan-verify — there is no ''aida plan add''; plans are docs/plans/ files, so e33 has the learner write one and lint it with ''aida plan verify''. (2) doctor-fsck → store-audit — there is no ''aida doctor''; e34 teaches ''aida db info'' + ''aida db check --collisions'', the real store-health pair. (3) doctor-migrate-counter-scope — DROPPED: ''aida config'' reports ''not supported for git backend'' (the default mode), so counter-scope migration is unreachable from a git-canonical store. (4) mcp-serve — e35 has the learner pipe a JSON-RPC tools/call into ''aida mcp-serve'' and capture the reply to mcp-probe.json (verifiable on disk, no --self-check flag needed). All 35 exercises pass ''aida-tutor demo''.'
