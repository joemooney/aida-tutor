title: 'Tutor cluster 5 (code review + commit pair): exercises for Aida-Store trailer, review prompt --pr'
description: |
  Cover the code↔store pairing (EPIC-21) and review workflow (STORY-67). 2-3 exercises:

  - **eXX commit-pair-trailer**: write a commit with the prepare-commit-msg hook installed → verify `Aida-Store: <sha>` trailer was added automatically
  - **eXX review-prompt-specs**: `aida review prompt --specs FR-1` → verify it prints the acceptance section + diff hints
  - **eXX review-prompt-pr**: `gh pr create` (mock or real), `aida review prompt --pr 1` → verify it pulls all linked specs and emits a review brief

  Note: the `--pr` exercise needs `gh` available. Mark as optional or scaffold a fake-gh wrapper for the workspace.
