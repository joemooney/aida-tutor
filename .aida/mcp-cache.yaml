- id: 019e0ed1-78d6-7860-b4b0-1472f325548d
  spec_id: ADR-1
  agreed_id: ADR-1
  title: Use the installed aida CLI as a subprocess, not the aida-core crate as a library
  description: 'The tutor verifies that the user''s `aida` invocations produced the right state. Spawning aida as a subprocess is the only way to test the actual CLI surface (parsing, output formatting, exit codes) — the same surface the user is learning. Linking aida-core as a library would test something subtly different. Cost: the tutor needs aida on PATH; the README documents this.'
  status: Approved
  priority: High
  owner: ''
  feature: Uncategorized
  created_at: 2026-05-09T22:17:49.526924035Z
  modified_at: 2026-05-09T22:17:49.526924035Z
  req_type: Decision
- id: 019e0ed1-7b0c-7053-889f-54b2f682d96b
  spec_id: ADR-2
  agreed_id: ADR-2
  title: Exercise content lives in markdown files, not Rust string literals
  description: 'Each exercise''s task description, hint, and ''what you''ll learn'' lives in content/NN-slug.md. Rust code only knows the slug + verifier. Pros: writing/editing exercises is a pure markdown task (no recompile); content can be PR''d by non-Rust contributors; the model can grade content quality without reading Rust.'
  status: Approved
  priority: Medium
