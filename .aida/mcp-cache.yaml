  spec_id: PRIN-1
  agreed_id: PRIN-1
  title: Verifiers inspect on-disk state, never patch it
  description: 'Every exercise verifier reads the workspace + .aida-store/ + git state and reports Pass/Fail/Pending. It NEVER edits the user''s files, ids, or store contents. The user is the only mutator. This keeps the tutor honest: if the verifier passes, the user actually did the thing.'
