  description: |
    Cover AIDA's distributed mode (EPIC-16). 3-4 exercises:

    - **eXX init-distributed**: `aida init` (default — git-canonical) → verify orphan branch + .aida-store/ + .aida/cache.db
    - **eXX add-then-push-store**: capture a req, then `aida push` with both `git push` and `aida store push`. Learner observes the orphan branch on origin.
